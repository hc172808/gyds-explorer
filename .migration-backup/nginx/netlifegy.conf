# ============================================================
# Nginx reverse proxy for the GYDS / Guardian Chain stack
# Place at: /etc/nginx/sites-available/netlifegy
# Symlink:  ln -s /etc/nginx/sites-available/netlifegy /etc/nginx/sites-enabled/
# Reload:   sudo nginx -t && sudo systemctl reload nginx
#
# Issue certificates first:
#   sudo certbot --nginx -d explorer.netlifegy.com -d api.netlifegy.com \
#                        -d rpc.netlifegy.com -d www.netlifegy.com
# ============================================================

# ---------- Redirect HTTP -> HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name explorer.netlifegy.com api.netlifegy.com rpc.netlifegy.com www.netlifegy.com netlifegy.com;
    return 301 https://$host$request_uri;
}

# ---------- Frontend: explorer.netlifegy.com ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name explorer.netlifegy.com;

    # SSL certs (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/explorer.netlifegy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/explorer.netlifegy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/gyds-explorer/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # SPA fallback (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets
    location ~* \.(?:js|css|woff2?|ttf|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy feature-gate management service
    location /fgate/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- Go Explorer API: api.netlifegy.com ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.netlifegy.com;

    ssl_certificate     /etc/letsencrypt/live/api.netlifegy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.netlifegy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # CORS handled by the Go service; nginx only forwards.
    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:8545;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Dedicated health endpoint (also reachable as /health from upstream)
    location = /health {
        proxy_pass http://127.0.0.1:8545/health;
        access_log off;
    }
}

# ---------- JSON-RPC node endpoint: rpc.netlifegy.com ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rpc.netlifegy.com;

    ssl_certificate     /etc/letsencrypt/live/rpc.netlifegy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpc.netlifegy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8545;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
